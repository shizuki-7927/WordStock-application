{% extends "words/base.html" %}

{% block title %}ジャンル登録 | WordStock{% endblock %}

{% block content %}
<div class="mx-auto max-w-xl rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
  <h1 class="text-2xl font-bold">ジャンルを作成</h1>

  <form method="post" class="mt-6 space-y-5">
    {% csrf_token %}

    {% for field in form %}
      <div>
        <label for="{{ field.id_for_label }}" class="block text-sm font-semibold text-slate-700">
          {{ field.label }}
        </label>
        <div class="mt-2">{{ field }}</div>
        {% if field.errors %}
          <p class="mt-1 text-sm text-red-600">{{ field.errors|striptags }}</p>
        {% endif %}
      </div>
    {% endfor %}

    <div class="flex justify-end gap-3">
      <a href="{% url 'words:genre_list' %}" class="rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold hover:bg-slate-50">
        キャンセル
      </a>
      <button type="submit" class="rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700">
        保存
      </button>
    </div>
  </form>
</div>

<style>
  input[type="text"] {
    width: 100%;
    border-radius: 0.375rem;
    border: 1px solid rgb(203 213 225);
    padding: 0.5rem 0.75rem;
    font-size: 0.875rem;
    outline: none;
  }

  input[type="text"]:focus {
    border-color: rgb(59 130 246);
    box-shadow: 0 0 0 3px rgb(219 234 254);
  }
</style>
{% endblock %}
