{% extends "words/base.html" %}

{% block title %}{{ word.word }} | WordStock{% endblock %}

{% block content %}
<article class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
  <p class="text-sm text-slate-500">ジャンル: {{ word.genre.name }}</p>
  <h1 class="mt-2 text-3xl font-bold">{{ word.word }}</h1>

  <section class="mt-6">
    <h2 class="text-sm font-semibold text-slate-500">意味・定義</h2>
    <p class="mt-2 whitespace-pre-line leading-7">{{ word.meaning }}</p>
  </section>

  <section class="mt-6">
    <h2 class="text-sm font-semibold text-slate-500">具体例・例文</h2>
    <p class="mt-2 whitespace-pre-line leading-7">{{ word.example|default:"未入力" }}</p>
  </section>

  <div class="mt-8 flex flex-wrap gap-3">
    <a href="{% url 'words:update' word.pk %}" class="rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700">
      編集する
    </a>
    <a href="{% url 'words:delete' word.pk %}" class="rounded-md bg-red-600 px-4 py-2 text-sm font-semibold text-white hover:bg-red-700">
      削除する
    </a>
    <a href="{% url 'words:genre_words' word.genre.pk %}" class="rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold hover:bg-slate-50">
      一覧へ戻る
    </a>
  </div>
</article>
{% endblock %}
