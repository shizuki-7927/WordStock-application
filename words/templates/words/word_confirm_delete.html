{% extends "words/base.html" %}

{% block title %}単語削除 | WordStock{% endblock %}

{% block content %}
<div class="mx-auto max-w-xl rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
  <h1 class="text-2xl font-bold">単語を削除</h1>

  <p class="mt-4 text-slate-700">
    「{{ object.word }}」を本当に削除しますか？
  </p>

  <form method="post" class="mt-6 flex justify-end gap-3">
    {% csrf_token %}

    <a href="{% url 'words:detail' object.pk %}" class="rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold hover:bg-slate-50">
      キャンセル
    </a>

    <button type="submit" class="rounded-md bg-red-600 px-4 py-2 text-sm font-semibold text-white hover:bg-red-700">
      削除する
    </button>
  </form>
</div>
{% endblock %}
