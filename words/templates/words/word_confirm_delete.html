<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}WordStock{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="border-b bg-white">
    <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-4">
      <a href="{% url 'words:list' %}" class="text-xl font-bold tracking-tight text-slate-950">WordStock</a>
      <a href="{% url 'words:create' %}" class="rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700">新規登録</a>
    </div>
  </header>

  <main class="mx-auto max-w-5xl px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
