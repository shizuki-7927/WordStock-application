{% extends "words/base.html" %}

{% block title %}ジャンル削除 | WordStock{% endblock %}

{% block content %}
<div class="mx-auto max-w-xl rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
  <h1 class="text-2xl font-bold">ジャンルを削除</h1>

  <p class="mt-4 text-slate-700">
    「{{ genre.name }}」を削除しますか？
  </p>

  <p class="mt-2 text-sm text-red-600">
    このジャンルに登録されている単語も削除されます。
  </p>

  <form method="post" class="mt-6 flex justify-end gap-3">
    {% csrf_token %}
    <a href="{% url 'words:genre_list' %}" class="rounded-md border border-slate-300 px-4 py-2 text-sm font-semibold hover:bg-slate-50">
      いいえ
    </a>
    <button type="submit" class="rounded-md bg-red-600 px-4 py-2 text-sm font-semibold text-white hover:bg-red-700">
      はい、削除する
    </button>
  </form>
</div>
{% endblock %}
